<h1>Candidate Results</h1>

<table border="1" cellpadding="10">
<tr>
    <th>Candidate</th>
    <th>Test</th>
    <th>Score</th>
    <th>Total Questions</th>
</tr>

{% for result in results %}
<tr>
    <td>{{ result.user.username }}</td>
    <td>{{ result.test.blueprint.name }}</td>
    <td>{{ result.score }}</td>
    <td>{{ result.total_questions }}</td>
</tr>
{% empty %}
<tr>
    <td colspan="4">No results available.</td>
</tr>
{% endfor %}
</table>

<br>

<a href="{% url 'employer_dashboard' %}">Back to Dashboard</a>
